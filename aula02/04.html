<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarto exercicio</title>
    <style>
        body{
            background-color: aquamarine;
            font: normal 20pt arial;
        }
        h1{
            color: yellow;
        }
        p{
            color: red;
        }
        
    </style>
</head>
<body>
    <h1>Oie</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sit ab dolorem nulla incidunt non corporis nesciunt deserunt fugiat repellendus eveniet eos possimus exercitationem, laudantium ratione sunt in rem vitae fuga!</p>

    <script>
        var name = window.prompt('qual é seu nome?')
        document.write(`Olá. ${name}, Seu nome tem ${name.length} letras. <br>`) 
        document.write(`Seu nome em maiusculo é ${name.toUpperCase()}<br>`)
        document.write(`Seu nome em minusculo é ${name.toLowerCase()}`)
    </script>
</body>
</html>
